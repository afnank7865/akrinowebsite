<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - AKRINO Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body.admin-login {
            min-height: 100vh;
            background: radial-gradient(1200px 800px at 30% 0%, rgba(74, 108, 247, 0.18), transparent 60%),
                radial-gradient(900px 700px at 100% 20%, rgba(99, 102, 241, 0.16), transparent 55%),
                #f6f7fb;
        }
        .login-card {
            border-radius: 18px;
            border: 1px solid rgba(15, 23, 42, 0.10);
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.10);
            overflow: hidden;
        }
        .login-card .card-header {
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.95) 0%, rgba(2, 6, 23, 0.95) 100%);
            color: #fff;
            border-bottom: none;
        }
        .toggle-password {
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>
<body class="admin-login">
    <div class="container d-flex align-items-center justify-content-center py-5">
        <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">
            <div class="card login-card">
                <div class="card-header p-4">
                    <h2 class="h4 mb-1">Admin Login</h2>
                    <div class="opacity-75">Please enter your credentials</div>
                </div>
                <div class="card-body p-4 bg-white">
                    <form id="adminLoginForm">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                <input type="email" id="email" name="email" class="form-control" placeholder="name@example.com" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required>
                                <span class="input-group-text"><i class="fas fa-eye toggle-password"></i></span>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2">Login</button>
                    </form>
                    <div id="loginError" class="text-danger mt-3"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/admin-auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
